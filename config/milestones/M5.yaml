    module: src.publish.youtube_uploader
    requires_credentials:
      - YT_CLIENT_ID
      - YT_CLIENT_SECRET
      - YT_REFRESH_TOKEN
  - slug: smoke
    title: End-to-end smoke — unlisted video live on YouTube
    agent: claude-code
    module: scripts.smoke_m5
